server.port=9005

server.servlet.context-path=/api/dgi/v1

#######################
# Postgres dgi db  Configuration  production 
######################
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.datasource.dgi.jdbc-url=jdbc:postgresql://192.168.88.95:5432/db_sfec_test
spring.datasource.dgi.username=dgi
spring.datasource.dgi.password=dgi
spring.datasource.dgi.hikari.connectionTimeout=20000
spring.datasource.dgi.hikari.idleTimeout=15000
spring.datasource.dgi.hikari.minimumIdle=10
spring.datasource.dgi.hikari.maxLifetime=1800000
spring.datasource.dgi.hikari.maximumPoolSize=1
spring.datasource.dgi.hikari.poolName=PostgresqlReportPool



########################
# Oracle Configuration #
########################

spring.datasource.oracle.jdbc-url=jdbc:oracle:thin:@192.168.88.89:1521:RAWNLIFE
spring.datasource.oracle.username=report
spring.datasource.oracle.password=report

spring.datasource.oracle.hikari.poolName=OracleReportPool

# nombre max de connexions ouvertes vers Oracle
spring.datasource.oracle.hikari.maximumPoolSize=3

# nombre minimal de connexions gardées dans le pool
spring.datasource.oracle.hikari.minimumIdle=1

# temps max d'attente pour obtenir une connexion
spring.datasource.oracle.hikari.connectionTimeout=30000

# fermeture des connexions inactives
spring.datasource.oracle.hikari.idleTimeout=120000

# durée max de vie d'une connexion
spring.datasource.oracle.hikari.maxLifetime=600000

# detection de fuite
spring.datasource.oracle.hikari.leakDetectionThreshold=30000

